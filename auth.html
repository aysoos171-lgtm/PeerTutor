<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In / Register - PeerTutor</title>
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body class="bg-slate-50 min-h-screen flex flex-col font-sans text-slate-900">
    <nav class="sticky top-0 z-50 bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shadow-sm">
      <a href="/index.html" class="flex items-center gap-2 no-underline">
        <div class="bg-blue-600 p-1.5 rounded-lg">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        </div>
        <span class="text-xl font-bold text-blue-900 tracking-tight">PeerTutor</span>
      </a>
    </nav>

    <main class="flex-grow flex items-center justify-center p-4 py-12">
      <div class="bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 max-w-md w-full overflow-hidden">
        <!-- Tabs -->
        <div class="flex border-b border-slate-100">
          <button id="signin-tab" class="flex-1 py-6 text-sm font-black uppercase tracking-widest border-b-4 border-blue-600 text-blue-600 transition-all">Sign In</button>
          <button id="register-tab" class="flex-1 py-6 text-sm font-black uppercase tracking-widest border-b-4 border-transparent text-slate-400 hover:text-slate-600 transition-all">Register</button>
        </div>

        <div class="p-10">
          <!-- Sign In Form -->
          <form id="signin-form" class="space-y-6">
            <div>
              <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Email Address</label>
              <input type="email" name="email" required placeholder="name@university.edu" class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-blue-50 focus:border-blue-400 outline-none transition-all font-medium">
            </div>
            <div>
              <div class="flex items-center justify-between mb-2">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Password</label>
                <a href="#" class="text-xs font-bold text-blue-600 hover:underline">Forgot?</a>
              </div>
              <input type="password" name="password" required placeholder="••••••••" class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-blue-50 focus:border-blue-400 outline-none transition-all font-medium">
            </div>
            <button type="submit" class="w-full py-5 bg-blue-600 text-white font-extrabold rounded-2xl hover:bg-blue-700 transition-all shadow-xl shadow-blue-100 transform hover:-translate-y-1 active:translate-y-0">Sign In</button>
            <div class="relative py-4">
              <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
              <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-slate-400 font-bold">Or continue with</span></div>
            </div>
            <button type="button" class="w-full py-4 bg-white border-2 border-slate-100 text-slate-600 font-bold rounded-2xl hover:bg-slate-50 transition-all flex items-center justify-center gap-3">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
              University SSO
            </button>
          </form>

          <!-- Register Form (Hidden by default) -->
          <form id="register-form" class="space-y-6 hidden">
            <div>
              <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Full Name</label>
              <input type="text" name="fullName" required placeholder="John Doe" class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-blue-50 focus:border-blue-400 outline-none transition-all font-medium">
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">University Email</label>
              <input type="email" name="email" required placeholder="name@university.edu" class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-blue-50 focus:border-blue-400 outline-none transition-all font-medium">
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Create Password</label>
              <input type="password" name="password" required placeholder="••••••••" class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-blue-50 focus:border-blue-400 outline-none transition-all font-medium">
            </div>
            <button type="submit" class="w-full py-5 bg-blue-600 text-white font-extrabold rounded-2xl hover:bg-blue-700 transition-all shadow-xl shadow-blue-100 transform hover:-translate-y-1 active:translate-y-0">Create Account</button>
          </form>
        </div>
      </div>
    </main>

    <footer class="py-8 text-center text-slate-400 text-sm">
      © 2024 PeerTutor Platform. All rights reserved.
    </footer>

    <script type="module">
      const signinTab = document.getElementById('signin-tab');
      const registerTab = document.getElementById('register-tab');
      const signinForm = document.getElementById('signin-form');
      const registerForm = document.getElementById('register-form');

      const params = new URLSearchParams(window.location.search);
      if (params.get('mode') === 'register') {
        showRegister();
      }

      signinTab.addEventListener('click', showSignIn);
      registerTab.addEventListener('click', showRegister);

      function showSignIn() {
        signinTab.classList.add('border-blue-600', 'text-blue-600');
        signinTab.classList.remove('border-transparent', 'text-slate-400');
        registerTab.classList.remove('border-blue-600', 'text-blue-600');
        registerTab.classList.add('border-transparent', 'text-slate-400');
        signinForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
      }

      function showRegister() {
        registerTab.classList.add('border-blue-600', 'text-blue-600');
        registerTab.classList.remove('border-transparent', 'text-slate-400');
        signinTab.classList.remove('border-blue-600', 'text-blue-600');
        signinTab.classList.add('border-transparent', 'text-slate-400');
        registerForm.classList.remove('hidden');
        signinForm.classList.add('hidden');
      }

      [signinForm, registerForm].forEach(form => {
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          const btn = form.querySelector('button[type="submit"]');
          btn.disabled = true;
          const originalText = btn.innerHTML;
          btn.innerHTML = 'Processing...';

          try {
            await fetch('https://formspree.io/f/xqewrgdb', {
              method: 'POST',
              body: new FormData(form),
              headers: {
                'Accept': 'application/json'
              }
            });
          } catch (err) {
            console.error('Formspree error:', err);
          }

          setTimeout(() => {
            window.location.href = '/student-search.html';
          }, 500);
        });
      });
    </script>
  </body>
</html>
